<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" role="img" aria-labelledby="title desc">
  <title id="title">FROG positioning chart</title>
  <desc id="desc">FROG positioning chart showing accessibility versus system-grade execution.</desc>
  <defs>
    <marker id="axis-arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5 L0,10 Z" fill="#2f5f9d"/>
    </marker>
    <marker id="gold-arrow" markerWidth="18" markerHeight="18" refX="14" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,6 L0,12 Z" fill="#d8a000"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#244b78" flood-opacity="0.24"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <style>
      .axis { stroke: #2f5f9d; stroke-width: 6; marker-end: url(#axis-arrow); }
      .blue { fill: #2f5f9d; font-family: "Segoe UI", Arial, sans-serif; }
      .gold { fill: #d8a000; font-family: "Segoe UI", Arial, sans-serif; }
      .label { font-size: 30px; font-weight: 500; }
      .axis-label { font-size: 30px; font-weight: 500; }
      .small { font-size: 26px; font-weight: 500; }
      .zone-title { font-size: 31px; font-weight: 800; filter: url(#shadow); }
      .bottleneck-title { font-size: 20px; font-weight: 800; }
      .bottleneck-note { font-size: 20px; font-style: italic; }
      .bullet { font-size: 20px; font-weight: 500; }
      .dot { fill: #2f5f9d; filter: url(#soft-shadow); }
      .dotted { stroke: #d8a000; stroke-width: 7; stroke-linecap: round; stroke-dasharray: 1 14; fill: none; }
      .trend { stroke: #d8a000; stroke-width: 7; marker-end: url(#gold-arrow); filter: url(#soft-shadow); }
    </style>
  </defs>

  <rect width="1200" height="850" fill="#ffffff"/>
  <rect x="128" y="286" width="370" height="440" fill="#f3c9c9" opacity="0.82"/>

  <line class="axis" x1="120" y1="735" x2="1090" y2="735"/>
  <line class="axis" x1="120" y1="735" x2="120" y2="110"/>

  <text class="blue small" x="22" y="67">(determinism, hardware control,</text>
  <text class="blue small" x="22" y="100">deployment depth)</text>
  <text class="blue axis-label" x="600" y="815" text-anchor="middle">Accessibility</text>
  <text class="blue axis-label" transform="translate(83 445) rotate(-90)" text-anchor="middle">System-grade execution</text>

  <rect x="130" y="180" width="370" height="96" fill="#f7d5d5" stroke="#2f5f9d" stroke-width="3" stroke-dasharray="24 12"/>
  <text class="blue bottleneck-title" x="150" y="210">Syntax Bottleneck Zone</text>
  <text class="blue bottleneck-note" x="150" y="238">Where implementation friction limits</text>
  <text class="blue bottleneck-note" x="150" y="266">ambition</text>

  <text class="blue zone-title" x="312" y="510" text-anchor="middle">Syntax-First Zone</text>

  <line class="dotted" x1="130" y1="292" x2="825" y2="292"/>
  <line class="dotted" x1="825" y1="292" x2="825" y2="725"/>
  <line class="trend" x1="165" y1="690" x2="802" y2="315"/>

  <text class="blue label" x="150" y="330">C</text>
  <circle class="dot" cx="214" cy="318" r="9"/>
  <text class="blue label" x="200" y="365">C++</text>
  <circle class="dot" cx="290" cy="318" r="9"/>
  <text class="blue label" x="300" y="365">RUST</text>
  <circle class="dot" cx="825" cy="500" r="9"/>
  <text class="blue label" x="690" y="512">LabVIEW</text>
  <circle class="dot" cx="742" cy="690" r="9"/>
  <text class="blue label" x="622" y="700">Python</text>

  <text class="gold small" x="875" y="27" text-anchor="middle">Disruptive Zone Where accessibility meets</text>
  <text class="gold small" x="875" y="58" text-anchor="middle">system-grade execution</text>
  <rect x="660" y="74" width="425" height="182" fill="#fff7df" stroke="#d8a000" stroke-width="3" stroke-dasharray="22 12"/>
  <circle cx="682" cy="100" r="4" fill="#2f5f9d"/>
  <text class="blue bullet" x="695" y="106">Visual dataflow programming, not syntax-</text>
  <text class="blue bullet" x="695" y="132">heavy coding</text>
  <circle cx="682" cy="155" r="4" fill="#2f5f9d"/>
  <text class="blue bullet" x="695" y="161">More accessible to engineers and domain</text>
  <text class="blue bullet" x="695" y="187">experts</text>
  <circle cx="682" cy="210" r="4" fill="#2f5f9d"/>
  <text class="blue bullet" x="695" y="216">Hardware-agnostic by design</text>
  <circle cx="682" cy="238" r="4" fill="#2f5f9d"/>
  <text class="blue bullet" x="695" y="244">From rapid prototyping to deployment</text>

  <polygon points="825,278 833,300 856,300 838,313 845,335 825,322 805,335 812,313 794,300 817,300" fill="#d8a000"/>
  <g transform="translate(850 246)">
    <ellipse cx="38" cy="27" rx="30" ry="22" fill="#fff6d7" stroke="#d8a000" stroke-width="3"/>
    <circle cx="18" cy="8" r="11" fill="#fff6d7" stroke="#d8a000" stroke-width="3"/>
    <circle cx="58" cy="8" r="11" fill="#fff6d7" stroke="#d8a000" stroke-width="3"/>
    <circle cx="18" cy="8" r="3" fill="#d8a000"/>
    <circle cx="58" cy="8" r="3" fill="#d8a000"/>
    <path d="M25 31 Q38 42 51 31" fill="none" stroke="#d8a000" stroke-width="3" stroke-linecap="round"/>
    <path d="M9 45 Q2 54 16 55" fill="none" stroke="#d8a000" stroke-width="3" stroke-linecap="round"/>
    <path d="M67 45 Q74 54 60 55" fill="none" stroke="#d8a000" stroke-width="3" stroke-linecap="round"/>
    <text class="gold" x="38" y="78" text-anchor="middle" font-size="14" font-weight="800">FROG</text>
  </g>
</svg>
