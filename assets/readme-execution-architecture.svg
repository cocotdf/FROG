<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1780" role="img" aria-labelledby="title desc">
  <title id="title">FROG execution architecture</title>
  <desc id="desc">Execution architecture from FROG IDE to Program Model, source, validation, Execution IR, lowering, target execution, and observability.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5 L0,10 Z" fill="#2f75c9"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5 L0,10 Z" fill="#38b86b"/>
    </marker>
    <marker id="arrow-gold" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5 L0,10 Z" fill="#d8a000"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#123143" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f8fbfd; }
      .box { fill: #ffffff; stroke: #2f75c9; stroke-width: 3; filter: url(#shadow); }
      .source { stroke: #38b86b; }
      .target { stroke: #d8a000; }
      .text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d3c5c; }
      .h1 { font-size: 38px; font-weight: 900; }
      .h2 { font-size: 29px; font-weight: 800; }
      .h3 { font-size: 23px; font-weight: 650; fill: #355f8f; }
      .small { font-size: 20px; font-weight: 600; fill: #355f8f; }
      .edge-blue { stroke: #2f75c9; stroke-width: 5; marker-end: url(#arrow-blue); }
      .edge-green { stroke: #38b86b; stroke-width: 5; marker-end: url(#arrow-green); }
      .edge-gold { stroke: #d8a000; stroke-width: 5; marker-end: url(#arrow-gold); }
      .edge { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1780"/>

  <rect class="box source" x="520" y="40" width="760" height="110" rx="24"/>
  <text class="text h1" x="900" y="88" text-anchor="middle">FROG IDE</text>
  <text class="text h3" x="900" y="126" text-anchor="middle">Diagram + Front Panel UI + Probes + Watches</text>
  <line class="edge edge-green" x1="900" y1="150" x2="900" y2="215"/>

  <rect class="box source" x="640" y="225" width="520" height="78" rx="22"/>
  <text class="text h2" x="900" y="276" text-anchor="middle">FROG Program Model</text>
  <text class="text small" x="900" y="335" text-anchor="middle">(editable in-memory source model)</text>

  <path class="edge edge-green" d="M820 303 L820 380 L395 380"/>
  <path class="edge edge-blue" d="M980 303 L980 380 L1405 380"/>
  <text class="text small" x="610" y="360" text-anchor="middle">save / load</text>
  <text class="text small" x="1195" y="360" text-anchor="middle">execute / validate</text>

  <rect class="box source" x="110" y="395" width="570" height="140" rx="24"/>
  <text class="text h2" x="395" y="448" text-anchor="middle">OPEN SOURCE LAYER</text>
  <text class="text h2" x="395" y="488" text-anchor="middle">FROG Expression</text>
  <text class="text h3" x="395" y="525" text-anchor="middle">(.frog, canonical source)</text>

  <rect class="box" x="1120" y="395" width="570" height="225" rx="24"/>
  <text class="text h2" x="1405" y="440" text-anchor="middle">Validation against</text>
  <text class="text h3" x="1405" y="486" text-anchor="middle">Expression/</text>
  <text class="text h3" x="1405" y="524" text-anchor="middle">Language/</text>
  <text class="text h3" x="1405" y="562" text-anchor="middle">Libraries/</text>
  <text class="text h3" x="1405" y="592" text-anchor="middle">Profiles/</text>

  <path class="edge edge-blue" d="M680 465 C760 525 830 575 900 642"/>
  <path class="edge edge-blue" d="M1120 500 C1040 545 965 585 900 642"/>

  <rect class="box" x="420" y="650" width="960" height="145" rx="28"/>
  <text class="text h2" x="900" y="700" text-anchor="middle">OPEN EXECUTION LAYER</text>
  <text class="text h1" x="900" y="748" text-anchor="middle">FROG Execution IR</text>
  <text class="text small" x="900" y="782" text-anchor="middle">(canonical execution-facing document, derived, inspectable,</text>
  <text class="text small" x="900" y="810" text-anchor="middle">source-attributed, execution-facing, not backend-private)</text>

  <line class="edge edge-blue" x1="900" y1="795" x2="900" y2="870"/>
  <rect class="box" x="580" y="880" width="640" height="68" rx="22"/>
  <text class="text h2" x="900" y="925" text-anchor="middle">Identity / Mapping preservation</text>

  <line class="edge edge-blue" x1="900" y1="948" x2="900" y2="1010"/>
  <rect class="box" x="550" y="1020" width="700" height="68" rx="22"/>
  <text class="text h2" x="900" y="1065" text-anchor="middle">Lowering / backend-facing handoff</text>

  <line class="edge edge-blue" x1="900" y1="1088" x2="900" y2="1145"/>
  <rect class="box target" x="490" y="1155" width="820" height="70" rx="22"/>
  <text class="text h2" x="900" y="1200" text-anchor="middle">Compiler(s) / Backend(s) / Runtime(s)</text>

  <line class="edge edge-gold" x1="900" y1="1225" x2="900" y2="1285"/>
  <rect class="box target" x="620" y="1295" width="560" height="70" rx="22"/>
  <text class="text h2" x="900" y="1340" text-anchor="middle">Target execution instance</text>

  <path class="edge edge-gold" d="M900 1365 L900 1418 L500 1418 L500 1470"/>
  <path class="edge edge-gold" d="M900 1365 L900 1418 L1300 1418 L1300 1470"/>

  <rect class="box" x="175" y="1480" width="650" height="105" rx="24"/>
  <text class="text h2" x="500" y="1525" text-anchor="middle">Source-aligned execution observability</text>
  <text class="text small" x="500" y="1562" text-anchor="middle">(mapped back to meaningful FROG objects)</text>

  <rect class="box target" x="1030" y="1498" width="540" height="70" rx="22"/>
  <text class="text h2" x="1300" y="1542" text-anchor="middle">Runtime activity on the active target</text>

  <line class="edge edge-blue" x1="500" y1="1585" x2="500" y2="1650"/>
  <rect class="box" x="145" y="1660" width="710" height="76" rx="22"/>
  <text class="text h3" x="500" y="1708" text-anchor="middle">Debugging / inspection / pause / resume / break / step</text>
</svg>
