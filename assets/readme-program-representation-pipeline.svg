<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">FROG program representation pipeline</title>
  <desc id="desc">A vertical pipeline from .frog source to loadability, structural validity, Program Model, validated meaning, FIR posture, and lowering.</desc>
  <defs>
    <marker id="arrow" markerWidth="15" markerHeight="15" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 Z" fill="#2f75c9"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#123143" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f8fbfd; }
      .card { fill: #ffffff; stroke: #2f75c9; stroke-width: 3; filter: url(#shadow); }
      .source { stroke: #38b86b; }
      .fir { stroke: #d8a000; }
      .text { font: 800 31px "Segoe UI", Arial, sans-serif; fill: #1d3c5c; }
      .small { font: 700 27px "Segoe UI", Arial, sans-serif; fill: #355f8f; }
      .arrow { stroke: #2f75c9; stroke-width: 5; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
  </defs>

  <rect class="bg" width="900" height="1200"/>

  <rect class="card source" x="230" y="50" width="440" height="92" rx="24"/>
  <text class="text" x="450" y="107" text-anchor="middle">.frog source</text>
  <line class="arrow" x1="450" y1="142" x2="450" y2="205"/>

  <rect class="card source" x="230" y="215" width="440" height="92" rx="24"/>
  <text class="text" x="450" y="272" text-anchor="middle">loadability</text>
  <line class="arrow" x1="450" y1="307" x2="450" y2="370"/>

  <rect class="card source" x="230" y="380" width="440" height="92" rx="24"/>
  <text class="text" x="450" y="437" text-anchor="middle">structural validity</text>
  <line class="arrow" x1="450" y1="472" x2="450" y2="535"/>

  <rect class="card" x="155" y="545" width="590" height="112" rx="24"/>
  <text class="text" x="450" y="593" text-anchor="middle">Program Model /</text>
  <text class="small" x="450" y="630" text-anchor="middle">validated source-derived program</text>
  <line class="arrow" x1="450" y1="657" x2="450" y2="720"/>

  <rect class="card" x="155" y="730" width="590" height="92" rx="24"/>
  <text class="text" x="450" y="787" text-anchor="middle">validated program meaning</text>
  <line class="arrow" x1="450" y1="822" x2="450" y2="885"/>

  <rect class="card fir" x="105" y="895" width="690" height="112" rx="24"/>
  <text class="text" x="450" y="943" text-anchor="middle">canonical execution-facing representation</text>
  <text class="small" x="450" y="980" text-anchor="middle">(FIR posture)</text>
  <line class="arrow" x1="450" y1="1007" x2="450" y2="1070"/>

  <rect class="card" x="105" y="1080" width="690" height="92" rx="24"/>
  <text class="text" x="450" y="1137" text-anchor="middle">lowering / backend-facing handoff</text>
</svg>
