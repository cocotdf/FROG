<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FROG specification and architecture documentation hosted on GitHub Pages.">
  <title>FROG Specification</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #1f9d55;
      --body-bg: #f7faf8;
      --body-bg-solid: #f7faf8;
      --body-color: #23312b;
      --muted-color: #556861;
      --link-color: #1d7a46;
      --nav-safe-right: 12rem;
      --nav-shift-left: 6.5rem;
      --nav-shift-up: 0.45rem;
      --nav-link-size: 1.2rem;
      --nav-link-weight: 700;
      --sidebar-width: 330px;
      --sidebar-border-color: #d6e3db;
      --heading-color: #0f1a15;
      --sidebar-bg: rgba(255, 255, 255, 0.96);
      --panel-bg: rgba(255, 255, 255, 0.98);
      --panel-bg-soft: rgba(247, 250, 248, 0.94);
      --search-bg: #ffffff;
      --search-border: #c7d8cf;
      --surface-border: #d6e3db;
      --surface-shadow: rgba(15, 23, 42, 0.08);
      --hero-bg: linear-gradient(145deg, rgba(31, 157, 85, 0.08), rgba(255, 255, 255, 0.98) 44%, rgba(26, 94, 63, 0.07));
      --card-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(240, 247, 243, 0.96));
      --button-border: #a7f3c7;
      --button-bg: rgba(220, 252, 231, 0.9);
      --button-bg-hover: #bbf7d0;
      --button-color: #166534;
      --toggle-bg: rgba(255, 255, 255, 0.92);
      --toggle-border: rgba(134, 161, 150, 0.45);
      --toggle-shadow: rgba(15, 23, 42, 0.12);
      --code-bg: rgba(15, 23, 42, 0.06);
      --page-glow-start: rgba(31, 157, 85, 0.14);
      --page-glow-end: rgba(22, 101, 52, 0.08);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --theme-color: #58a6ff;
      --body-bg: #0d1117;
      --body-bg-solid: #0d1117;
      --body-color: #c9d1d9;
      --muted-color: #8b949e;
      --link-color: #58a6ff;
      --sidebar-border-color: #30363d;
      --heading-color: #e6edf3;
      --sidebar-bg: #161b22;
      --panel-bg: #161b22;
      --panel-bg-soft: rgba(13, 17, 23, 0.92);
      --search-bg: #0d1117;
      --search-border: #30363d;
      --surface-border: #30363d;
      --surface-shadow: rgba(1, 4, 9, 0.28);
      --hero-bg: linear-gradient(180deg, rgba(22, 27, 34, 0.98), rgba(13, 17, 23, 0.98));
      --card-bg: linear-gradient(180deg, rgba(22, 27, 34, 0.98), rgba(13, 17, 23, 0.98));
      --button-border: #30363d;
      --button-bg: #21262d;
      --button-bg-hover: #30363d;
      --button-color: #e6edf3;
      --toggle-bg: #161b22;
      --toggle-border: #30363d;
      --toggle-shadow: rgba(1, 4, 9, 0.25);
      --code-bg: rgba(110, 118, 129, 0.16);
      --page-glow-start: rgba(88, 166, 255, 0.06);
      --page-glow-end: rgba(139, 148, 158, 0.04);
    }

    html:not([data-theme="dark"]) {
      color-scheme: light;
    }

    body {
      color: var(--body-color);
      background:
        radial-gradient(circle at top left, var(--page-glow-start), transparent 32%),
        radial-gradient(circle at top right, var(--page-glow-end), transparent 22%),
        var(--body-bg-solid);
    }

    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border-color);
      box-shadow: 0 0 24px rgba(15, 23, 42, 0.05);
    }

    .search {
      padding-top: 1rem;
      border-bottom: 1px solid var(--sidebar-border-color);
    }

    .search input {
      color: var(--body-color);
      background: var(--search-bg);
      border-radius: 10px;
      border: 1px solid var(--search-border);
      padding: 0.75rem 0.9rem;
    }

    .sidebar-nav {
      padding: 0.7rem 0 1.45rem;
    }

    .sidebar-nav ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .sidebar-nav li {
      margin: 0;
    }

    .sidebar-nav li > ul {
      margin-left: 1.1rem;
      padding-left: 0.55rem;
      border-left: 1px solid color-mix(in srgb, var(--surface-border) 78%, transparent);
    }

    .sidebar-nav li > ul[hidden] {
      display: none !important;
    }

    .frog-nav-entry {
      display: flex;
      align-items: flex-start;
      gap: 0.42rem;
      width: 100%;
    }

    .frog-nav-toggle,
    .frog-nav-spacer {
      flex: 0 0 1.15rem;
      width: 1.15rem;
      height: 1.15rem;
      margin: 0.38rem 0 0 0.85rem;
    }

    .frog-nav-spacer {
      display: inline-block;
    }

    .frog-nav-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--surface-border);
      border-radius: 0.35rem;
      background: var(--button-bg);
      color: var(--heading-color);
      box-shadow: 0 4px 12px var(--surface-shadow);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .frog-nav-toggle:hover {
      transform: translateY(-1px);
      background: var(--button-bg-hover);
      border-color: var(--button-border);
    }

    .frog-nav-toggle:focus-visible {
      outline: 2px solid var(--theme-color);
      outline-offset: 2px;
    }

    .frog-nav-entry > a,
    .frog-nav-entry > p,
    .sidebar-nav li > a,
    .sidebar-nav li > p {
      flex: 1 1 auto;
      min-width: 0;
      margin: 0;
      padding: 0.28rem 1rem 0.28rem 0;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .frog-nav-branch > .frog-nav-entry > a,
    .frog-nav-branch > .frog-nav-entry > p,
    .frog-nav-leaf > .frog-nav-entry > a,
    .frog-nav-leaf > .frog-nav-entry > p {
      padding-left: 0;
    }

    .frog-nav-branch.is-open > .frog-nav-entry > .frog-nav-toggle {
      background: var(--button-bg-hover);
      border-color: var(--button-border);
      color: var(--theme-color);
    }

    .frog-nav-branch.is-active-trail > .frog-nav-entry > a,
    .frog-nav-branch.is-active-trail > .frog-nav-entry > p,
    .frog-nav-leaf.is-active-trail > .frog-nav-entry > a,
    .frog-nav-leaf.is-active-trail > .frog-nav-entry > p {
      color: var(--theme-color);
    }

    .sidebar ul li a,
    .sidebar ul li p,
    .app-name,
    .app-name-link,
    .search input::placeholder {
      color: var(--body-color);
    }

    .sidebar ul li.active > a,
    .sidebar ul li a:hover,
    .app-nav a:hover,
    .app-nav a.active {
      color: var(--theme-color);
    }

    .app-name-link img {
      max-height: 44px;
      width: auto;
    }

    .app-nav a {
      color: var(--muted-color);
      font-size: var(--nav-link-size);
      font-weight: var(--nav-link-weight);
      letter-spacing: -0.01em;
    }

    .app-nav {
      width: fit-content;
      max-width: calc(100% - var(--nav-safe-right));
      margin-left: auto;
      margin-right: auto;
      border-bottom: 0;
      background: transparent;
    }

    .app-nav ul {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      width: auto;
    }

    .app-nav li {
      margin: 0;
    }

    .markdown-section {
      color: var(--body-color);
      max-width: 1160px;
      padding-bottom: 5rem;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6,
    .markdown-section strong,
    .markdown-section b,
    .markdown-section th {
      color: var(--heading-color);
    }

    .markdown-section h1 a,
    .markdown-section h2 a,
    .markdown-section h3 a,
    .markdown-section h4 a,
    .markdown-section h1 a span,
    .markdown-section h2 a span,
    .markdown-section h3 a span,
    .markdown-section h4 a span {
      color: var(--heading-color) !important;
    }

    .markdown-section a {
      color: var(--link-color);
      font-weight: 600;
    }

    .markdown-section p,
    .markdown-section li,
    .markdown-section ul li,
    .markdown-section ol li,
    .markdown-section blockquote {
      color: var(--body-color);
    }

    .markdown-section em,
    .markdown-section small,
    .markdown-section blockquote p {
      color: var(--muted-color);
    }

    .markdown-section hr,
    .markdown-section h1,
    .markdown-section h2 {
      border-color: var(--surface-border);
    }

    .markdown-section blockquote {
      background: var(--panel-bg-soft);
      border-left: 4px solid var(--surface-border);
      border-radius: 0 10px 10px 0;
    }

    .markdown-section code {
      color: var(--heading-color);
      background: var(--code-bg);
    }

    .markdown-section pre {
      background: var(--panel-bg);
      border: 1px solid var(--surface-border);
      box-shadow: 0 12px 30px var(--surface-shadow);
    }

    .markdown-section pre > code {
      background: transparent;
    }

    .markdown-section table th,
    .markdown-section table td {
      border-color: var(--surface-border);
    }

    .markdown-section table tr {
      background: transparent;
    }

    .markdown-section p[align="center"],
    .markdown-section h1[align="center"] {
      text-align: center;
    }

    .markdown-section p[align="center"] img {
      max-width: min(100%, 720px);
    }

    .markdown-section img[alt="FROG logo"] {
      border-radius: 26px;
      padding: 1rem 1.2rem;
      background: var(--hero-bg);
      border: 1px solid var(--surface-border);
      box-shadow: 0 18px 48px var(--surface-shadow);
    }

    .markdown-section img[alt="FROG positioning chart"] {
      border-radius: 22px;
      border: 1px solid var(--surface-border);
      background: var(--card-bg);
      box-shadow: 0 16px 40px var(--surface-shadow);
      padding: 0.5rem;
    }

    .markdown-section .go-pages-link {
      display: none !important;
    }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 74px;
      z-index: 1002;
      min-width: 78px;
      padding: 0.55rem 0.85rem;
      border: 1px solid var(--toggle-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: var(--body-color);
      box-shadow: 0 12px 30px var(--toggle-shadow);
      backdrop-filter: blur(10px);
      font: inherit;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      border-color: var(--button-border);
      background: var(--button-bg-hover);
    }

    .theme-toggle:focus-visible {
      outline: 2px solid var(--theme-color);
      outline-offset: 2px;
    }

    @media screen and (min-width: 769px) {
      .app-nav {
        padding: 0.3rem 1.25rem 0.35rem;
        transform: translate(
          calc(var(--nav-shift-left) * -1),
          calc(var(--nav-shift-up) * -1)
        );
      }

      .sidebar {
        width: var(--sidebar-width);
      }

      .content {
        left: var(--sidebar-width);
      }
    }

    @media screen and (max-width: 768px) {
      .app-nav a {
        font-size: 1rem;
      }

      .app-nav {
        width: auto;
        max-width: 100%;
        margin-left: 0;
        margin-right: 0;
        transform: none;
      }

      .app-nav ul {
        justify-content: flex-start;
        gap: 0.55rem;
      }

      .theme-toggle {
        top: auto;
        right: 14px;
        bottom: 14px;
      }
    }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">Dark</button>
  <div id="app">Loading FROG documentation...</div>
  <script>
    var themeStorageKey = "graiphic-frog-theme";

    function preferredTheme() {
      try {
        var storedTheme = window.localStorage.getItem(themeStorageKey);
        if (storedTheme === "light" || storedTheme === "dark") {
          return storedTheme;
        }
      } catch (error) {
      }

      return "dark";
    }

    function applyTheme(theme) {
      var nextTheme = theme === "dark" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", nextTheme);

      var toggleButton = document.getElementById("theme-toggle");
      if (!toggleButton) {
        return;
      }

      var isDark = nextTheme === "dark";
      toggleButton.textContent = isDark ? "Light" : "Dark";
      toggleButton.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
      toggleButton.setAttribute("title", isDark ? "Switch to light mode" : "Switch to dark mode");
      toggleButton.setAttribute("aria-pressed", String(isDark));
    }

    function ensureThemeToggle() {
      var toggleButton = document.getElementById("theme-toggle");
      if (!toggleButton || toggleButton.dataset.bound === "true") {
        applyTheme(preferredTheme());
        return;
      }

      toggleButton.addEventListener("click", function () {
        var currentTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
        var nextTheme = currentTheme === "dark" ? "light" : "dark";
        try {
          window.localStorage.setItem(themeStorageKey, nextTheme);
        } catch (error) {
        }
        applyTheme(nextTheme);
      });

      toggleButton.dataset.bound = "true";
      applyTheme(preferredTheme());
    }

    ensureThemeToggle();

    function normalizeDocPath(path) {
      var normalized = path || "/Readme.md";
      normalized = normalized.split("?")[0].split("#")[0];

      if (!normalized.startsWith("/")) {
        normalized = "/" + normalized;
      }

      if (!/\.md$/i.test(normalized)) {
        if (!normalized.endsWith("/")) {
          normalized += "/";
        }
        normalized += "Readme.md";
      }

      return normalized.replace(/\/+/g, "/");
    }

    function currentFileFromRoute(vm) {
      var current = vm.route && (vm.route.file || vm.route.path) ? (vm.route.file || vm.route.path) : "/Readme.md";
      return normalizeDocPath(current);
    }

    var sidebarToggleStorageKey = "graiphic-frog-sidebar-state";

    function readSidebarToggleState() {
      try {
        var rawState = window.localStorage.getItem(sidebarToggleStorageKey);
        if (!rawState) {
          return {};
        }

        var parsedState = JSON.parse(rawState);
        return parsedState && typeof parsedState === "object" ? parsedState : {};
      } catch (error) {
        return {};
      }
    }

    function writeSidebarToggleState(state) {
      try {
        window.localStorage.setItem(sidebarToggleStorageKey, JSON.stringify(state || {}));
      } catch (error) {
      }
    }

    function slugifySidebarLabel(label) {
      return String(label || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function normalizeSidebarBranchHref(rawHref) {
      if (!rawHref) {
        return "";
      }

      var candidate = rawHref.trim();
      if (candidate.startsWith("#/")) {
        candidate = candidate.slice(1);
      }

      if (!candidate.startsWith("/")) {
        return "";
      }

      return normalizeDocPath(candidate);
    }

    function buildSidebarBranchKey(parentKey, label, rawHref, index) {
      var normalizedHref = normalizeSidebarBranchHref(rawHref);
      var keyPart = normalizedHref || ((slugifySidebarLabel(label) || "section") + "#" + index);
      return parentKey ? (parentKey + ">" + keyPart) : keyPart;
    }

    function branchHasActiveTrail(branchElement, labelElement) {
      if (!branchElement) {
        return false;
      }

      if (branchElement.classList.contains("active")) {
        return true;
      }

      if (labelElement && labelElement.classList.contains("active")) {
        return true;
      }

      return !!branchElement.querySelector(":scope > ul .active");
    }

    function branchShouldBeOpen(branchKey, hasActiveTrail, toggleState) {
      var branchState = toggleState ? toggleState[branchKey] : null;

      if (branchState === "expanded") {
        return true;
      }

      if (branchState === "collapsed") {
        return false;
      }

      return hasActiveTrail;
    }

    function ensureSidebarEntryWrapper(item, labelElement) {
      var entry = item.querySelector(":scope > .frog-nav-entry");
      if (!entry) {
        entry = document.createElement("div");
        entry.className = "frog-nav-entry";
        item.insertBefore(entry, labelElement);
      }

      if (labelElement.parentElement !== entry) {
        entry.appendChild(labelElement);
      }

      return entry;
    }

    function ensureSidebarSpacer(entry) {
      var spacer = entry.querySelector(":scope > .frog-nav-spacer");
      var existingToggle = entry.querySelector(":scope > .frog-nav-toggle");

      if (existingToggle) {
        existingToggle.remove();
      }

      if (!spacer) {
        spacer = document.createElement("span");
        spacer.className = "frog-nav-spacer";
        spacer.setAttribute("aria-hidden", "true");
        entry.insertBefore(spacer, entry.firstChild);
      }
    }

    function ensureSidebarToggle(entry) {
      var toggle = entry.querySelector(":scope > .frog-nav-toggle");
      var existingSpacer = entry.querySelector(":scope > .frog-nav-spacer");

      if (existingSpacer) {
        existingSpacer.remove();
      }

      if (!toggle) {
        toggle = document.createElement("button");
        toggle.className = "frog-nav-toggle";
        toggle.type = "button";
        entry.insertBefore(toggle, entry.firstChild);
      }

      return toggle;
    }

    function applySidebarBranchState(branchElement, isOpen, branchKey) {
      var toggle = branchElement.querySelector(":scope > .frog-nav-entry > .frog-nav-toggle");
      var childList = branchElement.querySelector(":scope > ul");

      branchElement.classList.toggle("is-open", !!isOpen);
      branchElement.classList.toggle("is-collapsed", !isOpen);

      if (toggle) {
        toggle.textContent = isOpen ? "-" : "+";
        toggle.setAttribute("aria-expanded", String(!!isOpen));
        toggle.setAttribute("aria-label", isOpen ? "Collapse section" : "Expand section");
        toggle.setAttribute("title", isOpen ? "Collapse section" : "Expand section");
        toggle.setAttribute("data-branch-key", branchKey);
      }

      if (childList) {
        childList.hidden = !isOpen;
      }
    }

    function decorateSidebarBranch(item, toggleState, parentKey, index) {
      if (!(item instanceof HTMLElement) || item.tagName !== "LI") {
        return;
      }

      var labelElement = item.querySelector(":scope > a, :scope > p");
      if (!labelElement) {
        return;
      }

      var entry = ensureSidebarEntryWrapper(item, labelElement);
      var childList = item.querySelector(":scope > ul");
      var branchKey = buildSidebarBranchKey(parentKey, labelElement.textContent, labelElement.getAttribute("href"), index);
      var isActiveTrail = branchHasActiveTrail(item, labelElement);

      item.dataset.branchKey = branchKey;
      item.classList.toggle("is-active-trail", isActiveTrail);

      if (childList) {
        item.classList.add("frog-nav-branch");
        item.classList.remove("frog-nav-leaf");

        var toggle = ensureSidebarToggle(entry);
        var isOpen = branchShouldBeOpen(branchKey, isActiveTrail, toggleState);
        applySidebarBranchState(item, isOpen, branchKey);

        Array.prototype.forEach.call(childList.children, function (childItem, childIndex) {
          decorateSidebarBranch(childItem, toggleState, branchKey, childIndex);
        });

        return;
      }

      item.classList.remove("frog-nav-branch", "is-open", "is-collapsed");
      item.classList.add("frog-nav-leaf");
      ensureSidebarSpacer(entry);
    }

    function decorateSidebarWithToggles() {
      var navRoot = document.querySelector(".sidebar-nav");
      if (!navRoot) {
        return;
      }

      var rootList = navRoot.querySelector(":scope > ul");
      if (!rootList) {
        return;
      }

      var toggleState = readSidebarToggleState();
      navRoot.classList.add("frog-collapsible-sidebar");

      Array.prototype.forEach.call(rootList.children, function (item, index) {
        decorateSidebarBranch(item, toggleState, "root", index);
      });

      if (navRoot.dataset.frogNavToggleBound === "true") {
        return;
      }

      navRoot.addEventListener("click", function (event) {
        var toggle = event.target.closest(".frog-nav-toggle[data-branch-key]");
        if (!toggle) {
          return;
        }

        event.preventDefault();

        var branchElement = toggle.closest(".frog-nav-branch");
        if (!branchElement) {
          return;
        }

        var branchKey = toggle.getAttribute("data-branch-key");
        var toggleState = readSidebarToggleState();
        toggleState[branchKey] = branchElement.classList.contains("is-open") ? "collapsed" : "expanded";
        writeSidebarToggleState(toggleState);
        decorateSidebarWithToggles();
      });

      navRoot.dataset.frogNavToggleBound = "true";
    }

    function resolveLocalDocLink(rawHref, currentFile) {
      if (!rawHref) {
        return null;
      }

      if (
        rawHref.startsWith("#") ||
        rawHref.startsWith("mailto:") ||
        rawHref.startsWith("tel:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawHref)
      ) {
        return null;
      }

      var parts = rawHref.split("#", 2);
      var pathPart = parts[0];
      var anchorPart = parts.length > 1 ? parts[1] : "";

      if (!pathPart) {
        return null;
      }

      if (/\.md$/i.test(pathPart)) {
      } else if (/\/$/.test(pathPart)) {
        pathPart += "Readme.md";
      } else if (!/\.[a-z0-9]+$/i.test(pathPart)) {
        pathPart += "/Readme.md";
      } else {
        return null;
      }

      var currentDir = currentFile.replace(/[^/]*$/, "");
      var resolved = new URL(pathPart, "https://frog.local" + currentDir).pathname.replace(/\/+/g, "/");
      var docsifyHref = "#" + resolved;

      if (anchorPart) {
        docsifyHref += "?id=" + encodeURIComponent(anchorPart);
      }

      return docsifyHref;
    }

    function resolveSamePageAnchorHref(rawHref, currentFile) {
      if (!rawHref || !rawHref.startsWith("#") || rawHref.startsWith("#/")) {
        return null;
      }

      var anchorId = rawHref.slice(1);
      if (!anchorId) {
        return null;
      }

      return "#" + normalizeDocPath(currentFile) + "?id=" + encodeURIComponent(anchorId);
    }

    function resolveLocalAssetUrl(rawUrl, currentFile) {
      if (!rawUrl) {
        return null;
      }

      if (
        rawUrl.startsWith("#") ||
        rawUrl.startsWith("data:") ||
        rawUrl.startsWith("blob:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawUrl)
      ) {
        return null;
      }

      var currentDir = currentFile.replace(/[^/]*$/, "");
      var resolvedPath = new URL(rawUrl, "https://frog.local" + currentDir).pathname.replace(/\/+/g, "/");
      return new URL(resolvedPath.replace(/^\//, ""), window.location.href.split("#")[0]).href;
    }

    function resolveLocalAssetHref(rawHref, currentFile) {
      if (!rawHref) {
        return null;
      }

      if (/^(?:[a-z]+:)?\/\//i.test(rawHref) || rawHref.startsWith("mailto:") || rawHref.startsWith("tel:")) {
        return null;
      }

      var candidate = rawHref;

      if (candidate.startsWith("#/")) {
        candidate = candidate.slice(2);
      } else if (candidate.startsWith("#")) {
        return null;
      }

      var parts = candidate.split("#", 2);
      var pathPart = parts[0];
      var anchorPart = parts.length > 1 ? parts[1] : "";

      if (!pathPart || /\.md$/i.test(pathPart) || !/\.[a-z0-9]+$/i.test(pathPart)) {
        return null;
      }

      var rewrittenHref = resolveLocalAssetUrl(pathPart, currentFile);
      if (!rewrittenHref) {
        return null;
      }

      if (anchorPart) {
        rewrittenHref += "#" + anchorPart;
      }

      return rewrittenHref;
    }

    window.$docsify = {
      name: "FROG",
      repo: "Graiphic/FROG",
      homepage: "Readme.md",
      loadSidebar: true,
      loadNavbar: true,
      auto2top: true,
      subMaxLevel: 2,
      maxLevel: 3,
      relativePath: false,
      alias: {
        "/.*/_sidebar.md": "/_sidebar.md",
        "/.*/_navbar.md": "/_navbar.md"
      },
      search: {
        placeholder: "Search the FROG spec",
        noData: "No matching section found.",
        depth: 3
      },
      plugins: [
        function (hook, vm) {
          hook.beforeEach(function (markdown) {
            var currentFile = currentFileFromRoute(vm);

            return markdown.replace(
              /(<img\b[^>]*\bsrc=["'])([^"']+)(["'][^>]*>)/gi,
              function (match, prefix, rawSrc, suffix) {
                var rewrittenSrc = resolveLocalAssetUrl(rawSrc, currentFile);
                if (!rewrittenSrc) {
                  return match;
                }
                return prefix + rewrittenSrc + suffix;
              }
            );
          });

          hook.doneEach(function () {
            var currentFile = currentFileFromRoute(vm);

            document.querySelectorAll(".markdown-section a[href], .cover-main a[href], .app-nav a[href], .sidebar-nav a[href]").forEach(function (anchor) {
              var rawHref = anchor.getAttribute("href");
              var rewrittenAnchorHref = resolveSamePageAnchorHref(rawHref, currentFile);
              if (rewrittenAnchorHref) {
                anchor.setAttribute("href", rewrittenAnchorHref);
                return;
              }

              var rewrittenAssetHref = resolveLocalAssetHref(rawHref, currentFile);
              if (rewrittenAssetHref) {
                anchor.setAttribute("href", rewrittenAssetHref);
                anchor.setAttribute("target", "_blank");
                anchor.setAttribute("rel", "noopener noreferrer");
                return;
              }

              var rewrittenHref = resolveLocalDocLink(rawHref, currentFile);
              if (rewrittenHref) {
                anchor.setAttribute("href", rewrittenHref);
              }
            });

            document.querySelectorAll(".markdown-section img[src]").forEach(function (image) {
              var rawSrc = image.getAttribute("src");
              var rewrittenSrc = resolveLocalAssetUrl(rawSrc, currentFile);
              if (rewrittenSrc) {
                image.setAttribute("src", rewrittenSrc);
              }
            });

            window.requestAnimationFrame(function () {
              decorateSidebarWithToggles();
            });
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
