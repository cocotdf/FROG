<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FROG specification and architecture documentation hosted on GitHub Pages.">
  <title>FROG Specification</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #1f9d55;
      --body-bg: #f7faf8;
      --body-bg-solid: #f7faf8;
      --body-color: #23312b;
      --muted-color: #556861;
      --link-color: #1d7a46;
      --nav-safe-right: 12rem;
      --nav-shift-left: 8.75rem;
      --nav-shift-up: 0.55rem;
      --nav-link-size: 1.2rem;
      --nav-link-weight: 700;
      --sidebar-width: 330px;
      --sidebar-border-color: #d6e3db;
      --heading-color: #0f1a15;
      --sidebar-bg: rgba(255, 255, 255, 0.96);
      --panel-bg: rgba(255, 255, 255, 0.98);
      --panel-bg-soft: rgba(247, 250, 248, 0.94);
      --search-bg: #ffffff;
      --search-border: #c7d8cf;
      --surface-border: #d6e3db;
      --surface-shadow: rgba(15, 23, 42, 0.08);
      --hero-bg: linear-gradient(145deg, rgba(31, 157, 85, 0.08), rgba(255, 255, 255, 0.98) 44%, rgba(26, 94, 63, 0.07));
      --card-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(240, 247, 243, 0.96));
      --button-border: #a7f3c7;
      --button-bg: rgba(220, 252, 231, 0.9);
      --button-bg-hover: #bbf7d0;
      --button-color: #166534;
      --toggle-bg: rgba(255, 255, 255, 0.92);
      --toggle-border: rgba(134, 161, 150, 0.45);
      --toggle-shadow: rgba(15, 23, 42, 0.12);
      --code-bg: rgba(15, 23, 42, 0.06);
      --page-glow-start: rgba(31, 157, 85, 0.14);
      --page-glow-end: rgba(22, 101, 52, 0.08);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --theme-color: #58a6ff;
      --body-bg: #0d1117;
      --body-bg-solid: #0d1117;
      --body-color: #c9d1d9;
      --muted-color: #8b949e;
      --link-color: #58a6ff;
      --sidebar-border-color: #30363d;
      --heading-color: #e6edf3;
      --sidebar-bg: #161b22;
      --panel-bg: #161b22;
      --panel-bg-soft: rgba(13, 17, 23, 0.92);
      --search-bg: #0d1117;
      --search-border: #30363d;
      --surface-border: #30363d;
      --surface-shadow: rgba(1, 4, 9, 0.28);
      --hero-bg: linear-gradient(180deg, rgba(22, 27, 34, 0.98), rgba(13, 17, 23, 0.98));
      --card-bg: linear-gradient(180deg, rgba(22, 27, 34, 0.98), rgba(13, 17, 23, 0.98));
      --button-border: #30363d;
      --button-bg: #21262d;
      --button-bg-hover: #30363d;
      --button-color: #e6edf3;
      --toggle-bg: #161b22;
      --toggle-border: #30363d;
      --toggle-shadow: rgba(1, 4, 9, 0.25);
      --code-bg: rgba(110, 118, 129, 0.16);
      --page-glow-start: rgba(88, 166, 255, 0.06);
      --page-glow-end: rgba(139, 148, 158, 0.04);
    }

    html:not([data-theme="dark"]) {
      color-scheme: light;
    }

    body {
      color: var(--body-color);
      background:
        radial-gradient(circle at top left, var(--page-glow-start), transparent 32%),
        radial-gradient(circle at top right, var(--page-glow-end), transparent 22%),
        var(--body-bg-solid);
    }

    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border-color);
      box-shadow: 0 0 24px rgba(15, 23, 42, 0.05);
    }

    .search {
      padding-top: 1rem;
      border-bottom: 1px solid var(--sidebar-border-color);
    }

    .search input {
      color: var(--body-color);
      background: var(--search-bg);
      border-radius: 10px;
      border: 1px solid var(--search-border);
      padding: 0.75rem 0.9rem;
    }

    .search .results-panel {
      margin-top: 0.55rem;
      border: 1px solid var(--surface-border);
      border-radius: 12px;
      background: var(--sidebar-bg);
      box-shadow: 0 12px 30px var(--surface-shadow);
      color: var(--body-color);
      overflow: hidden;
    }

    .search .matching-post {
      border-bottom: 1px solid var(--surface-border);
      background: transparent;
    }

    .search .matching-post:last-child {
      border-bottom: 0;
    }

    .search .matching-post a {
      color: var(--body-color) !important;
      background: transparent;
    }

    .search .matching-post a:hover {
      background: var(--panel-bg-soft);
    }

    .search .matching-post h2,
    .search .matching-post p,
    .search .matching-post li,
    .search .matching-post ul,
    .search .matching-post strong,
    .search .matching-post em,
    .search .matching-post span,
    .search .results-panel .empty {
      color: var(--body-color) !important;
    }

    .search .matching-post h2 {
      color: var(--heading-color) !important;
    }

    .search .search-keyword {
      color: var(--theme-color) !important;
      font-weight: 700;
    }

    .search .clear-button {
      color: var(--muted-color);
    }

    .frog-search-target {
      border-radius: 0.6rem;
      background: color-mix(in srgb, var(--theme-color) 18%, transparent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--theme-color) 28%, transparent);
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .sidebar-nav {
      padding: 0.7rem 0 1.45rem;
    }

    .sidebar-nav ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .sidebar-nav li {
      margin: 0;
    }

    .sidebar-nav li > ul {
      margin-left: 1.1rem;
      padding-left: 0.55rem;
      border-left: 1px solid color-mix(in srgb, var(--surface-border) 78%, transparent);
    }

    .sidebar-nav li > ul[hidden] {
      display: none !important;
    }

    .frog-nav-entry {
      display: flex;
      align-items: flex-start;
      gap: 0.42rem;
      width: 100%;
    }

    .frog-nav-toggle,
    .frog-nav-spacer {
      flex: 0 0 1.15rem;
      width: 1.15rem;
      height: 1.15rem;
      margin: 0.38rem 0 0 0.85rem;
    }

    .frog-nav-spacer {
      display: inline-block;
    }

    .frog-nav-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--surface-border);
      border-radius: 0.35rem;
      background: var(--button-bg);
      color: var(--heading-color);
      box-shadow: 0 4px 12px var(--surface-shadow);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .frog-nav-toggle:hover {
      transform: translateY(-1px);
      background: var(--button-bg-hover);
      border-color: var(--button-border);
    }

    .frog-nav-toggle:focus-visible {
      outline: 2px solid var(--theme-color);
      outline-offset: 2px;
    }

    .frog-nav-entry > a,
    .frog-nav-entry > p,
    .sidebar-nav li > a,
    .sidebar-nav li > p {
      flex: 1 1 auto;
      min-width: 0;
      margin: 0;
      padding: 0.28rem 1rem 0.28rem 0;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .graiphic-nav-link,
    .graiphic-nav-label-button {
      flex: 1 1 auto;
      min-width: 0;
      margin: 0;
      padding: 0.28rem 1rem 0.28rem 0;
      line-height: 1.35;
      overflow-wrap: anywhere;
      color: var(--body-color);
      background: transparent;
      border: 0;
      font: inherit;
      font-size: 0.98rem;
      font-weight: 500;
      text-align: left;
      text-decoration: none;
      cursor: pointer;
    }

    .graiphic-nav-link:hover,
    .graiphic-nav-label-button:hover {
      color: var(--theme-color);
      text-decoration: none;
    }

    .graiphic-nav-link.is-category,
    .graiphic-nav-label-button.is-category {
      font-weight: 600;
    }

    .graiphic-nav-link.is-active,
    .graiphic-nav-label-button.is-active {
      color: var(--theme-color);
    }

    .frog-nav-branch > .frog-nav-entry > a,
    .frog-nav-branch > .frog-nav-entry > p,
    .frog-nav-leaf > .frog-nav-entry > a,
    .frog-nav-leaf > .frog-nav-entry > p {
      padding-left: 0;
    }

    .frog-nav-branch > .frog-nav-entry > .graiphic-nav-label-button,
    .frog-nav-leaf > .frog-nav-entry > .graiphic-nav-label-button {
      padding-left: 0;
    }

    .frog-nav-branch.is-open > .frog-nav-entry > .frog-nav-toggle {
      background: var(--button-bg-hover);
      border-color: var(--button-border);
      color: var(--theme-color);
    }

    .frog-nav-branch.is-active-trail > .frog-nav-entry > a,
    .frog-nav-branch.is-active-trail > .frog-nav-entry > p,
    .frog-nav-leaf.is-active-trail > .frog-nav-entry > a,
    .frog-nav-leaf.is-active-trail > .frog-nav-entry > p {
      color: var(--theme-color);
    }

    .frog-nav-branch.is-active-trail > .frog-nav-entry > .graiphic-nav-label-button,
    .frog-nav-leaf.is-active-trail > .frog-nav-entry > .graiphic-nav-label-button {
      color: var(--theme-color);
    }

    .markdown-section a.frog-home-logo-link {
      display: inline-block;
      text-decoration: none;
    }

    .sidebar ul li a,
    .sidebar ul li p,
    .app-name,
    .app-name-link,
    .search input::placeholder {
      color: var(--body-color);
    }

    .sidebar ul li.active > a,
    .sidebar ul li a:hover,
    .app-nav a:hover,
    .app-nav a.active {
      color: var(--theme-color);
    }

    .sidebar-toggle {
      background: var(--sidebar-bg);
      border-top: 1px solid var(--sidebar-bg);
      box-shadow: none;
    }

    body.close .sidebar-toggle {
      background: var(--sidebar-bg);
      border-top-color: var(--sidebar-bg);
      box-shadow: none;
    }

    .app-name-link img {
      max-height: 44px;
      width: auto;
    }

    .app-nav a {
      color: var(--muted-color);
      font-size: var(--nav-link-size);
      font-weight: var(--nav-link-weight);
      letter-spacing: -0.01em;
    }

    .app-nav {
      width: fit-content;
      max-width: calc(100% - var(--nav-safe-right));
      margin-left: auto;
      margin-right: auto;
      border-bottom: 0;
      background: transparent;
    }

    .app-nav ul {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      width: auto;
    }

    .app-nav li {
      margin: 0;
    }

    .markdown-section {
      color: var(--body-color);
      max-width: 1160px;
      padding-bottom: 5rem;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6,
    .markdown-section strong,
    .markdown-section b,
    .markdown-section th {
      color: var(--heading-color);
    }

    .markdown-section h1 a,
    .markdown-section h2 a,
    .markdown-section h3 a,
    .markdown-section h4 a,
    .markdown-section h1 a span,
    .markdown-section h2 a span,
    .markdown-section h3 a span,
    .markdown-section h4 a span {
      color: var(--heading-color) !important;
    }

    .markdown-section a {
      color: var(--link-color);
      font-weight: 600;
    }

    .markdown-section p,
    .markdown-section li,
    .markdown-section ul li,
    .markdown-section ol li,
    .markdown-section blockquote {
      color: var(--body-color);
    }

    .markdown-section em,
    .markdown-section small,
    .markdown-section blockquote p {
      color: var(--muted-color);
    }

    .markdown-section hr,
    .markdown-section h1,
    .markdown-section h2 {
      border-color: var(--surface-border);
    }

    .markdown-section blockquote {
      background: var(--panel-bg-soft);
      border-left: 4px solid var(--surface-border);
      border-radius: 0 10px 10px 0;
    }

    .markdown-section code {
      color: var(--heading-color);
      background: var(--code-bg);
    }

    .markdown-section pre,
    .markdown-section pre > code,
    .markdown-section pre > code * {
      color: var(--body-color) !important;
    }

    .markdown-section pre {
      background: var(--panel-bg);
      border: 1px solid var(--surface-border);
      box-shadow: 0 12px 30px var(--surface-shadow);
    }

    .markdown-section pre > code,
    .markdown-section pre > code * {
      background: transparent;
    }

    .markdown-section table th,
    .markdown-section table td {
      border-color: var(--surface-border);
    }

    .markdown-section table tr {
      background: transparent;
    }

    .markdown-section p[align="center"],
    .markdown-section h1[align="center"] {
      text-align: center;
    }

    .markdown-section p[align="center"] img {
      max-width: min(100%, 720px);
    }

    .markdown-section img[alt="FROG logo"] {
      border-radius: 26px;
      padding: 1rem 1.2rem;
      background: var(--hero-bg);
      border: 1px solid var(--surface-border);
      box-shadow: 0 18px 48px var(--surface-shadow);
    }

    .markdown-section img[alt="FROG positioning chart"] {
      border-radius: 22px;
      border: 1px solid var(--surface-border);
      background: var(--card-bg);
      box-shadow: 0 16px 40px var(--surface-shadow);
      padding: 0.5rem;
    }

    .markdown-section .go-pages-link {
      display: none !important;
    }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 74px;
      z-index: 1002;
      min-width: 78px;
      padding: 0.55rem 0.85rem;
      border: 1px solid var(--toggle-border);
      border-radius: 999px;
      background: var(--toggle-bg);
      color: var(--body-color);
      box-shadow: 0 12px 30px var(--toggle-shadow);
      backdrop-filter: blur(10px);
      font: inherit;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      border-color: var(--button-border);
      background: var(--button-bg-hover);
    }

    .theme-toggle:focus-visible {
      outline: 2px solid var(--theme-color);
      outline-offset: 2px;
    }

    @media screen and (min-width: 769px) {
      .app-nav {
        padding: 0.3rem 1.25rem 0.35rem;
        transform: translate(
          calc(var(--nav-shift-left) * -1),
          calc(var(--nav-shift-up) * -1)
        );
      }

      .sidebar {
        width: var(--sidebar-width);
      }

      .content {
        left: var(--sidebar-width);
      }
    }

    @media screen and (max-width: 768px) {
      .app-nav a {
        font-size: 1rem;
      }

      .app-nav {
        width: auto;
        max-width: 100%;
        margin-left: 0;
        margin-right: 0;
        transform: none;
      }

      .app-nav ul {
        justify-content: flex-start;
        gap: 0.55rem;
      }

      .theme-toggle {
        top: auto;
        right: 14px;
        bottom: 14px;
      }
    }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">Dark</button>
  <div id="app">Loading FROG documentation...</div>
  <script>
    var themeStorageKey = "graiphic-frog-theme";

    function preferredTheme() {
      try {
        var storedTheme = window.localStorage.getItem(themeStorageKey);
        if (storedTheme === "light" || storedTheme === "dark") {
          return storedTheme;
        }
      } catch (error) {
      }

      return "dark";
    }

    function applyTheme(theme) {
      var nextTheme = theme === "dark" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", nextTheme);

      var toggleButton = document.getElementById("theme-toggle");
      if (!toggleButton) {
        return;
      }

      var isDark = nextTheme === "dark";
      toggleButton.textContent = isDark ? "Light" : "Dark";
      toggleButton.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
      toggleButton.setAttribute("title", isDark ? "Switch to light mode" : "Switch to dark mode");
      toggleButton.setAttribute("aria-pressed", String(isDark));
    }

    function ensureThemeToggle() {
      var toggleButton = document.getElementById("theme-toggle");
      if (!toggleButton || toggleButton.dataset.bound === "true") {
        applyTheme(preferredTheme());
        return;
      }

      toggleButton.addEventListener("click", function () {
        var currentTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
        var nextTheme = currentTheme === "dark" ? "light" : "dark";
        try {
          window.localStorage.setItem(themeStorageKey, nextTheme);
        } catch (error) {
        }
        applyTheme(nextTheme);
      });

      toggleButton.dataset.bound = "true";
      applyTheme(preferredTheme());
    }

    ensureThemeToggle();

    function buildKnownPathMap(navData) {
      var map = {};
      var searchPaths = navData && Array.isArray(navData.searchPaths) ? navData.searchPaths : [];

      function registerKnownPath(rawPath) {
        if (!rawPath) {
          return;
        }

        var normalized = String(rawPath).replace(/\/+/g, "/");
        if (normalized === "/") {
          normalized = "/Readme.md";
        }

        if (!normalized.startsWith("/")) {
          normalized = "/" + normalized;
        }

        map[normalized.toLowerCase()] = normalized;

        if (/\.md$/i.test(normalized)) {
          map[normalized.replace(/\.md$/i, "").toLowerCase()] = normalized;
          map[normalized.replace(/\/Readme\.md$/i, "").toLowerCase() || "/"] = normalized;
          map[normalized.replace(/\/Readme\.md$/i, "/Readme").toLowerCase()] = normalized;
        }
      }

      searchPaths.forEach(registerKnownPath);
      registerKnownPath("/Readme.md");
      return map;
    }

    function normalizeDisplayPath(path) {
      var normalized = String(path || "/Readme.md");

      if (normalized.startsWith("#")) {
        normalized = normalized.slice(1);
      }

      normalized = normalized.split("?")[0].split("#")[0];

      if (!normalized.startsWith("/")) {
        normalized = "/" + normalized;
      }

      normalized = normalized.replace(/\/+/g, "/");

      var knownPaths = window.__GRAIPHIC_KNOWN_PATHS__ || {};
      var directMatch = knownPaths[normalized.toLowerCase()];
      if (directMatch) {
        return directMatch;
      }

      if (/\.(md|frog|py)$/i.test(normalized)) {
        return normalized;
      }

      if (!normalized.endsWith("/")) {
        var segments = normalized.split("/").filter(Boolean);
        var lastSegment = segments.length ? segments[segments.length - 1] : "";

        if (/^readme$/i.test(lastSegment)) {
          normalized += ".md";
        } else {
          normalized += "/Readme.md";
        }
      } else {
        normalized += "Readme.md";
      }

      normalized = normalized.replace(/\/+/g, "/");
      return knownPaths[normalized.toLowerCase()] || normalized;
    }

    function currentFileFromRoute(vm) {
      var current = vm.route && (vm.route.file || vm.route.path) ? (vm.route.file || vm.route.path) : "/Readme.md";
      return normalizeDisplayPath(current);
    }

    function docsifyRouteForPath(path) {
      var normalized = normalizeDisplayPath(path);
      return normalized === "/Readme.md" ? "#/" : ("#" + normalized);
    }

    function displayDirectoryPrefix(path) {
      var normalized = normalizeDisplayPath(path);
      if (/\/Readme\.md$/i.test(normalized)) {
        return normalized.replace(/Readme\.md$/i, "");
      }
      return normalized.replace(/[^/]*$/, "");
    }

    function isBranchOpen(path, currentFile) {
      var normalized = normalizeDisplayPath(path);
      if (normalized === currentFile) {
        return true;
      }
      if (/\/Readme\.md$/i.test(normalized)) {
        return currentFile.startsWith(displayDirectoryPrefix(normalized));
      }
      return false;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    var codeLanguageByExtension = {
      ".frog": "json",
      ".py": "python"
    };

    function inferCodeLanguage(path) {
      var normalized = normalizeDisplayPath(path);
      if (/\.frog$/i.test(normalized)) {
        return codeLanguageByExtension[".frog"];
      }
      if (/\.py$/i.test(normalized)) {
        return codeLanguageByExtension[".py"];
      }
      return "text";
    }

    function wrapCodeDocumentMarkdown(currentFile, sourceText) {
      var normalizedPath = normalizeDisplayPath(currentFile);
      var relativePath = normalizedPath.replace(/^\//, "");
      var fileName = relativePath.split("/").pop() || relativePath;
      var fence = sourceText.indexOf("```") === -1 ? "```" : "````";
      var trimmedSource = String(sourceText || "").replace(/\r\n/g, "\n").replace(/\s+$/, "");

      return [
        "# " + fileName,
        "",
        "`" + relativePath + "`",
        "",
        fence + inferCodeLanguage(normalizedPath),
        trimmedSource,
        fence,
        ""
      ].join("\n");
    }

    function nodeStatePath(node, parentPath, index) {
      if (node && node.path) {
        return normalizeDisplayPath(node.path);
      }

      var keyPart = node && node.key ? String(node.key) : ("branch-" + (index || 0));
      return "node:" + (parentPath ? (parentPath + "/" + keyPart) : keyPart).toLowerCase();
    }

    function nodeContainsCurrentFile(node, currentFile) {
      if (!node) {
        return false;
      }

      if (node.path && isBranchOpen(node.path, currentFile)) {
        return true;
      }

      var children = Array.isArray(node.children) ? node.children : [];
      return children.some(function (child) {
        return nodeContainsCurrentFile(child, currentFile);
      });
    }

    function getNavigationChildren(node) {
      var children = Array.isArray(node && node.children) ? node.children.slice() : [];
      if (!node || !node.path || !children.length) {
        return children;
      }

      var normalizedPath = normalizeDisplayPath(node.path);
      var hasOverviewChild = children.some(function (child) {
        return !!(child && child.path) && normalizeDisplayPath(child.path) === normalizedPath;
      });

      if (hasOverviewChild) {
        return children;
      }

      return [{
        key: (node.key || normalizedPath) + "/overview",
        title: "Overview",
        path: normalizedPath,
        kind: "page",
        children: []
      }].concat(children);
    }

    function renderNavigationNodes(nodes, currentFile, depth, parentPath) {
      if (!nodes || !nodes.length) {
        return "";
      }

      var navState = window.__GRAIPHIC_NAV_STATE__ || { expandedPaths: {}, collapsedPaths: {} };
      var listClass = depth === 0 ? "graiphic-nav-list" : "graiphic-nav-children";

      return (
        '<ul class="' + listClass + '">' +
        nodes.map(function (node, index) {
          var children = getNavigationChildren(node);
          var hasChildren = children.length > 0;
          var statePath = nodeStatePath(node, parentPath, index);
          var active = !!node.path && normalizeDisplayPath(node.path) === currentFile;
          var activeTrail = hasChildren && nodeContainsCurrentFile(node, currentFile);
          var manuallyExpanded = !!navState.expandedPaths[statePath];
          var manuallyCollapsed = !!navState.collapsedPaths[statePath];
          var open = hasChildren && !manuallyCollapsed && (activeTrail || manuallyExpanded);
          var itemClasses = [hasChildren ? "frog-nav-branch" : "frog-nav-leaf"];

          if (hasChildren) {
            itemClasses.push(open ? "is-open" : "is-collapsed");
          }

          if (active || activeTrail) {
            itemClasses.push("is-active-trail");
          }

          if (active) {
            itemClasses.push("is-active");
          }

          var toggleHtml = hasChildren
            ? '<button class="frog-nav-toggle graiphic-nav-toggle-button" type="button" data-nav-path="' + escapeHtml(statePath) + '" aria-expanded="' + String(open) + '" aria-label="' + escapeHtml(open ? "Collapse section" : "Expand section") + '">' + (open ? "-" : "+") + "</button>"
            : '<span class="frog-nav-spacer" aria-hidden="true"></span>';

          var labelClass = "graiphic-nav-link " + (hasChildren ? "is-category" : "is-page") + (active ? " is-active" : "");
          var labelHtml = "";

          if (hasChildren) {
            labelHtml =
              '<button class="' + labelClass + ' graiphic-nav-label-button' + (activeTrail ? " is-active" : "") + '" type="button" data-nav-path="' + escapeHtml(statePath) + '">' +
                escapeHtml(node.title) +
              "</button>";
          } else if (node.path) {
            labelHtml =
              '<a class="' + labelClass + '" href="' + docsifyRouteForPath(node.path) + '">' +
                escapeHtml(node.title) +
              "</a>";
          } else {
            labelHtml =
              '<button class="' + labelClass + ' graiphic-nav-label-button' + (activeTrail ? " is-active" : "") + '" type="button" data-nav-path="' + escapeHtml(statePath) + '">' +
                escapeHtml(node.title) +
              "</button>";
          }

          var childrenHtml = open ? renderNavigationNodes(children, currentFile, depth + 1, statePath) : "";
          return '<li class="' + itemClasses.join(" ") + '" data-nav-path="' + escapeHtml(statePath) + '"><div class="frog-nav-entry">' + toggleHtml + labelHtml + "</div>" + childrenHtml + "</li>";
        }).join("") +
        "</ul>"
      );
    }

    function bindSidebarNavigation(vm, navRoot) {
      if (!navRoot || navRoot.__graiphicBound) {
        return;
      }

      navRoot.addEventListener("click", function (event) {
        var toggle = event.target.closest(".graiphic-nav-toggle-button[data-nav-path], .graiphic-nav-label-button[data-nav-path]");
        if (!toggle) {
          return;
        }

        event.preventDefault();

        var branchElement = toggle.closest(".frog-nav-branch");
        if (!branchElement) {
          return;
        }

        var path = toggle.getAttribute("data-nav-path");
        var navState = window.__GRAIPHIC_NAV_STATE__ || (window.__GRAIPHIC_NAV_STATE__ = { expandedPaths: {}, collapsedPaths: {} });
        var activeTrail = branchElement.classList.contains("is-active-trail");
        var manuallyExpanded = !!navState.expandedPaths[path];
        var manuallyCollapsed = !!navState.collapsedPaths[path];
        var currentlyOpen = !manuallyCollapsed && (activeTrail || manuallyExpanded);

        if (currentlyOpen) {
          if (activeTrail) {
            navState.collapsedPaths[path] = true;
          } else {
            delete navState.expandedPaths[path];
          }
        } else {
          delete navState.collapsedPaths[path];
          navState.expandedPaths[path] = true;
        }

        renderSidebarNavigation(vm);
      });

      navRoot.__graiphicBound = true;
    }

    function placeSidebarSearch(attempt) {
      var sidebar = document.querySelector(".sidebar");
      if (!sidebar) {
        return;
      }

      var search = document.querySelector("div.search");
      var appName = sidebar.querySelector(".app-name");

      if (!search) {
        if ((attempt || 0) < 12) {
          window.setTimeout(function () {
            placeSidebarSearch((attempt || 0) + 1);
          }, 120);
        }
        return;
      }

      if (appName) {
        if (search.previousElementSibling !== null || sidebar.firstElementChild !== search || search.nextElementSibling !== appName) {
          sidebar.insertBefore(search, appName);
        }
        return;
      }

      if (sidebar.firstElementChild !== search) {
        sidebar.insertBefore(search, sidebar.firstElementChild);
      }
    }

    function renderSidebarNavigation(vm) {
      var navData = window.__GRAIPHIC_NAV__;
      if (!navData || !Array.isArray(navData.sections)) {
        return;
      }

      var sidebar = document.querySelector(".sidebar");
      if (!sidebar) {
        return;
      }

      var navRoot = sidebar.querySelector(".sidebar-nav");
      if (!navRoot) {
        navRoot = document.createElement("nav");
        navRoot.className = "sidebar-nav";
        sidebar.appendChild(navRoot);
      }

      var currentFile = currentFileFromRoute(vm);
      bindSidebarNavigation(vm, navRoot);

      var html =
        '<div class="graiphic-nav">' +
        navData.sections.map(function (section) {
          var children = Array.isArray(section.children) ? section.children : [];
          var sectionTitle = section.title
            ? '<div class="graiphic-nav-section-title">' + escapeHtml(section.title) + "</div>"
            : "";

          return (
            '<section class="graiphic-nav-section">' +
              sectionTitle +
              renderNavigationNodes(children, currentFile, 0, null) +
            "</section>"
          );
        }).join("") +
        "</div>";

      navRoot.innerHTML = html;
      placeSidebarSearch(0);
    }

    function bindFrogLogoHomeLinks() {
      document.querySelectorAll('.markdown-section img[alt="FROG logo"]').forEach(function (image) {
        var existingLink = image.closest("a");
        if (existingLink) {
          existingLink.setAttribute("href", "#/");
          existingLink.removeAttribute("target");
          existingLink.removeAttribute("rel");
          existingLink.classList.add("frog-home-logo-link");
          return;
        }

        var link = document.createElement("a");
        link.href = "#/";
        link.className = "frog-home-logo-link";
        image.parentNode.insertBefore(link, image);
        link.appendChild(image);
      });
    }

    function loadNavigationManifest() {
      try {
        var request = new XMLHttpRequest();
        request.open("GET", "nav-tree.json", false);
        request.send(null);

        if (request.status >= 200 && request.status < 300 && request.responseText) {
          return JSON.parse(request.responseText);
        }
      } catch (error) {
      }

      return { sections: [], searchPaths: [] };
    }

    function loadVirtualCodeRoute(path, next) {
      var normalizedPath = normalizeDisplayPath(path);
      var request = new XMLHttpRequest();
      var resolvedUrl = new URL(normalizedPath.replace(/^\//, ""), window.location.href.split("#")[0]).href;

      request.open("GET", resolvedUrl, true);
      request.onload = function () {
        if (request.status >= 200 && request.status < 300) {
          next(request.responseText);
          return;
        }

        next(false);
      };
      request.onerror = function () {
        next(false);
      };
      request.send();
    }

    function resolveLocalDocLink(rawHref, currentFile) {
      if (!rawHref) {
        return null;
      }

      if (
        rawHref.startsWith("#") ||
        rawHref.startsWith("mailto:") ||
        rawHref.startsWith("tel:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawHref)
      ) {
        return null;
      }

      var parts = rawHref.split("#", 2);
      var pathPart = parts[0];
      var anchorPart = parts.length > 1 ? parts[1] : "";

      if (!pathPart) {
        return null;
      }

      if (/\.[a-z0-9]+$/i.test(pathPart) && !/\.(md|frog|py)$/i.test(pathPart)) {
        return null;
      }

      var currentDir = normalizeDisplayPath(currentFile).replace(/[^/]*$/, "");
      var resolved = new URL(pathPart, "https://frog.local" + currentDir).pathname.replace(/\/+/g, "/");
      var docsifyHref = docsifyRouteForPath(resolved);

      if (anchorPart) {
        docsifyHref += "?id=" + encodeURIComponent(anchorPart);
      }

      return docsifyHref;
    }

    function resolveSamePageAnchorHref(rawHref, currentFile) {
      if (!rawHref || !rawHref.startsWith("#") || rawHref.startsWith("#/")) {
        return null;
      }

      var anchorId = rawHref.slice(1);
      if (!anchorId) {
        return null;
      }

      return docsifyRouteForPath(currentFile) + "?id=" + encodeURIComponent(anchorId);
    }

    function resolveLocalAssetUrl(rawUrl, currentFile) {
      if (!rawUrl) {
        return null;
      }

      if (
        rawUrl.startsWith("#") ||
        rawUrl.startsWith("data:") ||
        rawUrl.startsWith("blob:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawUrl)
      ) {
        return null;
      }

      var currentDir = normalizeDisplayPath(currentFile).replace(/[^/]*$/, "");
      var resolvedPath = new URL(rawUrl, "https://frog.local" + currentDir).pathname.replace(/\/+/g, "/");
      return new URL(resolvedPath.replace(/^\//, ""), window.location.href.split("#")[0]).href;
    }

    function resolveLocalAssetHref(rawHref, currentFile) {
      if (!rawHref) {
        return null;
      }

      if (/^(?:[a-z]+:)?\/\//i.test(rawHref) || rawHref.startsWith("mailto:") || rawHref.startsWith("tel:")) {
        return null;
      }

      var candidate = rawHref;

      if (candidate.startsWith("#/")) {
        candidate = candidate.slice(2);
      } else if (candidate.startsWith("#")) {
        return null;
      }

      var parts = candidate.split("#", 2);
      var pathPart = parts[0];
      var anchorPart = parts.length > 1 ? parts[1] : "";

      if (!pathPart || /\.(md|frog|py)$/i.test(pathPart) || !/\.[a-z0-9]+$/i.test(pathPart)) {
        return null;
      }

      var rewrittenHref = resolveLocalAssetUrl(pathPart, currentFile);
      if (!rewrittenHref) {
        return null;
      }

      if (anchorPart) {
        rewrittenHref += "#" + anchorPart;
      }

      return rewrittenHref;
    }

    var pendingSearchNavigationStorageKey = "graiphic-frog-pending-search-navigation";

    function normalizeSearchText(value) {
      var normalized = String(value || "").toLowerCase();

      if (normalized.normalize) {
        normalized = normalized.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      }

      return normalized;
    }

    function getSearchTerms(rawValue) {
      var trimmed = String(rawValue || "").trim();
      if (!trimmed) {
        return [];
      }

      var terms = [trimmed];
      trimmed.split(/[\s\-_/\\]+/).forEach(function (part) {
        if (part.length >= 3 && terms.indexOf(part) === -1) {
          terms.push(part);
        }
      });

      return terms
        .map(normalizeSearchText)
        .filter(function (term, index, values) {
          return !!term && values.indexOf(term) === index;
        })
        .sort(function (left, right) {
          return right.length - left.length;
        });
    }

    function extractDocsifyHrefParts(rawHref) {
      if (!rawHref) {
        return null;
      }

      var hash = rawHref;
      try {
        if (!rawHref.startsWith("#")) {
          hash = new URL(rawHref, window.location.href).hash || rawHref;
        }
      } catch (error) {
      }

      if (!hash.startsWith("#/")) {
        return null;
      }

      var route = hash.slice(1);
      var routeParts = route.split("?", 2);
      var searchParams = new URLSearchParams(routeParts.length > 1 ? routeParts[1] : "");

      return {
        path: normalizeDisplayPath(routeParts[0]),
        anchorId: searchParams.get("id") || ""
      };
    }

    function readPendingSearchNavigation() {
      try {
        var rawValue = window.sessionStorage.getItem(pendingSearchNavigationStorageKey);
        if (!rawValue) {
          return null;
        }

        var parsed = JSON.parse(rawValue);
        if (!parsed || typeof parsed !== "object") {
          return null;
        }

        if (!parsed.createdAt || (Date.now() - parsed.createdAt) > 120000) {
          window.sessionStorage.removeItem(pendingSearchNavigationStorageKey);
          return null;
        }

        return parsed;
      } catch (error) {
        return null;
      }
    }

    function writePendingSearchNavigation(href, rawSearchValue) {
      var hrefParts = extractDocsifyHrefParts(href);
      var searchValue = String(rawSearchValue || "").trim();

      if (!hrefParts || !searchValue) {
        return;
      }

      try {
        window.sessionStorage.setItem(
          pendingSearchNavigationStorageKey,
          JSON.stringify({
            path: hrefParts.path,
            anchorId: hrefParts.anchorId,
            searchValue: searchValue,
            createdAt: Date.now()
          })
        );
      } catch (error) {
      }
    }

    function clearPendingSearchNavigation() {
      try {
        window.sessionStorage.removeItem(pendingSearchNavigationStorageKey);
      } catch (error) {
      }
    }

    function bindSearchResultNavigation() {
      var resultsPanel = document.querySelector(".search .results-panel");
      if (!resultsPanel || resultsPanel.dataset.frogSearchNavigationBound === "true") {
        return;
      }

      resultsPanel.addEventListener("click", function (event) {
        var anchor = event.target.closest(".matching-post a[href]");
        if (!anchor) {
          return;
        }

        var searchInput = document.querySelector(".search input[type='search']");
        writePendingSearchNavigation(anchor.getAttribute("href"), searchInput ? searchInput.value : "");
      });

      resultsPanel.dataset.frogSearchNavigationBound = "true";
    }

    function currentSearchAnchorId(vm) {
      if (!vm || !vm.route || !vm.route.query || typeof vm.route.query.id !== "string") {
        return "";
      }

      return vm.route.query.id;
    }

    function searchScopeSelector() {
      return "p, li, blockquote, td, th, pre, code, h1, h2, h3, h4, h5, h6";
    }

    function findSearchAnchorElement(root, anchorId) {
      if (!root || !anchorId) {
        return null;
      }

      if (window.CSS && typeof window.CSS.escape === "function") {
        var escaped = window.CSS.escape(anchorId);
        return root.querySelector("#" + escaped) || document.getElementById(anchorId);
      }

      return document.getElementById(anchorId);
    }

    function getScopedSearchCandidates(root, anchorId) {
      if (!root) {
        return [];
      }

      var selector = searchScopeSelector();
      if (!anchorId) {
        return Array.prototype.slice.call(root.querySelectorAll(selector));
      }

      var anchorElement = findSearchAnchorElement(root, anchorId);
      var heading = anchorElement && anchorElement.closest ? (anchorElement.closest("h1, h2, h3, h4, h5, h6") || anchorElement) : null;
      if (!heading || !root.contains(heading) || !/^H[1-6]$/i.test(heading.tagName)) {
        return Array.prototype.slice.call(root.querySelectorAll(selector));
      }

      var level = parseInt(heading.tagName.slice(1), 10);
      var candidates = [];
      var cursor = heading;

      while (cursor) {
        if (cursor !== heading && /^H[1-6]$/i.test(cursor.tagName) && parseInt(cursor.tagName.slice(1), 10) <= level) {
          break;
        }

        if (cursor.matches && cursor.matches(selector)) {
          candidates.push(cursor);
        }

        if (cursor.querySelectorAll) {
          candidates = candidates.concat(Array.prototype.slice.call(cursor.querySelectorAll(selector)));
        }

        cursor = cursor.nextElementSibling;
      }

      return candidates.filter(function (candidate, index, allCandidates) {
        return allCandidates.indexOf(candidate) === index;
      });
    }

    function findMatchingSearchTarget(candidates, searchTerms) {
      for (var termIndex = 0; termIndex < searchTerms.length; termIndex += 1) {
        var searchTerm = searchTerms[termIndex];

        for (var candidateIndex = 0; candidateIndex < candidates.length; candidateIndex += 1) {
          var candidate = candidates[candidateIndex];
          var candidateText = normalizeSearchText(candidate.textContent || "");
          if (candidateText && candidateText.indexOf(searchTerm) !== -1) {
            return candidate;
          }
        }
      }

      return null;
    }

    function highlightSearchTarget(target) {
      document.querySelectorAll(".frog-search-target").forEach(function (element) {
        element.classList.remove("frog-search-target");
      });

      if (!target) {
        return;
      }

      target.classList.add("frog-search-target");
      window.setTimeout(function () {
        target.classList.remove("frog-search-target");
      }, 2200);
    }

    function applyPendingSearchNavigation(vm) {
      var pendingNavigation = readPendingSearchNavigation();
      if (!pendingNavigation) {
        return;
      }

      if (pendingNavigation.path !== currentFileFromRoute(vm)) {
        return;
      }

      var root = document.querySelector(".markdown-section");
      var searchTerms = getSearchTerms(pendingNavigation.searchValue);
      if (!root || !searchTerms.length) {
        clearPendingSearchNavigation();
        return;
      }

      var anchorId = pendingNavigation.anchorId || currentSearchAnchorId(vm);
      var scopedCandidates = getScopedSearchCandidates(root, anchorId);
      var fallbackCandidates = Array.prototype.slice.call(root.querySelectorAll(searchScopeSelector()));
      var target = findMatchingSearchTarget(scopedCandidates, searchTerms) || findMatchingSearchTarget(fallbackCandidates, searchTerms);

      clearPendingSearchNavigation();

      if (!target) {
        return;
      }

      window.requestAnimationFrame(function () {
        target.scrollIntoView({
          block: "center",
          inline: "nearest",
          behavior: "auto"
        });
        highlightSearchTarget(target);
      });
    }

    var navigationManifest = loadNavigationManifest();
    window.__GRAIPHIC_NAV__ = navigationManifest;
    window.__GRAIPHIC_NAV_STATE__ = window.__GRAIPHIC_NAV_STATE__ || { expandedPaths: {}, collapsedPaths: {} };
    window.__GRAIPHIC_KNOWN_PATHS__ = buildKnownPathMap(navigationManifest);

    var navigationSearchPaths = (navigationManifest.searchPaths || []).map(function (path) {
      return path === "/" ? "/Readme.md" : normalizeDisplayPath(path);
    });

    window.$docsify = {
      name: "FROG",
      repo: "Graiphic/FROG",
      homepage: "Readme.md",
      loadSidebar: false,
      loadNavbar: true,
      routes: {
        "/(.*)\\.frog": function (path, match, next) {
          loadVirtualCodeRoute(path, next);
        },
        "/(.*)\\.py": function (path, match, next) {
          loadVirtualCodeRoute(path, next);
        }
      },
      auto2top: true,
      subMaxLevel: 2,
      maxLevel: 3,
      relativePath: false,
      alias: {
        "/.*/_navbar.md": "/_navbar.md"
      },
      search: {
        placeholder: "Search the FROG spec",
        noData: "No matching section found.",
        depth: 3,
        paths: navigationSearchPaths
      },
      plugins: [
        function (hook, vm) {
          hook.beforeEach(function (markdown) {
            var currentFile = currentFileFromRoute(vm);

            if (/\.(frog|py)$/i.test(currentFile)) {
              return wrapCodeDocumentMarkdown(currentFile, markdown);
            }

            return markdown.replace(
              /(<img\b[^>]*\bsrc=["'])([^"']+)(["'][^>]*>)/gi,
              function (match, prefix, rawSrc, suffix) {
                var rewrittenSrc = resolveLocalAssetUrl(rawSrc, currentFile);
                if (!rewrittenSrc) {
                  return match;
                }
                return prefix + rewrittenSrc + suffix;
              }
            );
          });

          hook.doneEach(function () {
            var currentFile = currentFileFromRoute(vm);

            document.querySelectorAll(".markdown-section a[href], .cover-main a[href], .app-nav a[href], .sidebar-nav a[href]").forEach(function (anchor) {
              var rawHref = anchor.getAttribute("href");
              var rewrittenAnchorHref = resolveSamePageAnchorHref(rawHref, currentFile);
              if (rewrittenAnchorHref) {
                anchor.setAttribute("href", rewrittenAnchorHref);
                return;
              }

              var rewrittenAssetHref = resolveLocalAssetHref(rawHref, currentFile);
              if (rewrittenAssetHref) {
                anchor.setAttribute("href", rewrittenAssetHref);
                anchor.setAttribute("target", "_blank");
                anchor.setAttribute("rel", "noopener noreferrer");
                return;
              }

              var rewrittenHref = resolveLocalDocLink(rawHref, currentFile);
              if (rewrittenHref) {
                anchor.setAttribute("href", rewrittenHref);
              }
            });

            document.querySelectorAll(".markdown-section img[src]").forEach(function (image) {
              var rawSrc = image.getAttribute("src");
              var rewrittenSrc = resolveLocalAssetUrl(rawSrc, currentFile);
              if (rewrittenSrc) {
                image.setAttribute("src", rewrittenSrc);
              }
            });

            window.requestAnimationFrame(function () {
              bindSearchResultNavigation();
              renderSidebarNavigation(vm);
              bindFrogLogoHomeLinks();
              applyPendingSearchNavigation(vm);
            });
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
