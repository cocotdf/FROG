<svg xmlns="http://www.w3.org/2000/svg" width="220" height="88" viewBox="0 0 220 88" role="img" aria-labelledby="title desc">
  <title id="title">FROG Numeric Control Skin</title>
  <desc id="desc">Visual skin for a numeric control widget. Dynamic text and value are not embedded in the SVG.</desc>

  <defs>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B8FD6"/>
      <stop offset="1" stop-color="#3C6EAF"/>
    </linearGradient>
  </defs>

  <rect id="panel_background" x="1" y="1" width="218" height="86" rx="10" ry="10" fill="url(#panelFill)" stroke="#2B4F7B" stroke-width="2"/>
  <rect id="value_box" x="14" y="40" width="192" height="32" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.95" stroke="#2B4F7B" stroke-width="1.5"/>

  <g id="label_anchor" transform="translate(16, 24)"></g>
  <g id="value_anchor" transform="translate(22, 62)"></g>
</svg>
